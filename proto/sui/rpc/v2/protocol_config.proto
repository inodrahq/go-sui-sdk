syntax = "proto3";

package sui.rpc.v2;
option go_package = "github.com/inodrahq/go-sui-sdk/pb/sui/rpc/v2;v2";

message ProtocolConfig {
  optional uint64 protocol_version = 1;
  map<string, bool> feature_flags = 2;
  map<string, string> attributes = 3;
}
